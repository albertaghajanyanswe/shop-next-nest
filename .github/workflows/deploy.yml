name: Build & Push Release Images

on:
  push:
    tags:
      - "Release_*"

env:
  IMAGE_CLIENT: ${{ secrets.DOCKER_USERNAME }}/shop-client
  IMAGE_SERVER: ${{ secrets.DOCKER_USERNAME }}/shop-backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #       # Создаём .env.dev для клиента
      - name: Create client .env.dev
        run: |
          cat > ./client/.env.dev << EOF
          NEXT_PUBLIC_APP_ENV=${{ secrets.NEXT_PUBLIC_APP_ENV }}
          APP_DOMAIN=${{ secrets.APP_DOMAIN }}
          NEXT_PUBLIC_CLIENT_URL=${{ secrets.NEXT_PUBLIC_CLIENT_URL }}
          NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL }}
          NEXT_PUBLIC_SERVER_SERVICE=${{ secrets.NEXT_PUBLIC_SERVER_SERVICE }}
          NEXT_PUBLIC_ALLOW_PURCHASE=${{ secrets.NEXT_PUBLIC_ALLOW_PURCHASE }}
          EOF
      # CLIENT
      - name: Build & Push client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile.dev
          push: true
          build-args: |
            NEXT_PUBLIC_APP_ENV=${{ secrets.NEXT_PUBLIC_APP_ENV }}
            APP_DOMAIN=${{ secrets.APP_DOMAIN }}
            NEXT_PUBLIC_CLIENT_URL=${{ secrets.NEXT_PUBLIC_CLIENT_URL }}
            NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL }}
            NEXT_PUBLIC_SERVER_SERVICE=${{ secrets.NEXT_PUBLIC_SERVER_SERVICE }}
            NEXT_PUBLIC_ALLOW_PURCHASE=${{ secrets.NEXT_PUBLIC_ALLOW_PURCHASE }}
          tags: |
            ${{ env.IMAGE_CLIENT }}:${{ steps.tag.outputs.tag }}

      # SERVER
      - name: Build & Push server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile.dev
          push: true
          tags: |
            ${{ env.IMAGE_SERVER }}:${{ steps.tag.outputs.tag }}

