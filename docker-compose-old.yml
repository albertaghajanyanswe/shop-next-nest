version: "3.3"

services:
  db-service:
    container_name: db-service
    image: postgres:latest
    restart: always

    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_URI=${DB_URI}
    # ports:
    #   - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-connect
  server:
    container_name: server-service-shop
    restart: always
    build: ./server
    # uncomment network_mode variable to be able to run docker in localhost +
    # network_mode: host
    ports:
      - "4000:4000"
    depends_on:
      - db-service
    env_file:
      - ./server/.env
    #volumes:
    #  - /opt/<projectName>/logs/server:/usr/src/app/log
    environment:
      CLIENT_URL: ${CLIENT_URL}
      SERVER_URL: ${SERVER_URL}
      SERVER_DOMAIN: ${SERVER_DOMAIN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_URI: ${DB_URI}
    networks:
      - app-connect
  ui:
    container_name: client-service-shop
    build: ./client
    # uncomment network_mode variable to be able to run docker in localhost -
    # network_mode: host
    ports:
      - "3000:3000"
      # - "443:443"
      # generate certs and move it in /etc/nginx/certs directory
      # sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout private.key -out certificate.crt
    # volumes:
    #  - /etc/nginx/certs:/etc/nginx/certs

    env_file:
      - ./client/.env
    environment:
      - NODE_ENV=production
    networks:
      - app-connect
    depends_on:
      - server
    links:
      - server
volumes:
  db_data:

networks:
  app-connect:
    driver: bridge
